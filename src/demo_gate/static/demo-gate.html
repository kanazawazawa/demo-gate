<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デモアクセス</title>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      min-height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .gate-card {
      width: 420px;
      max-width: 92vw;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2.2rem 2rem;
      position: relative;
      overflow: hidden;
    }
    .gate-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }
    .gate-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .gate-logo .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      margin-bottom: 0.8rem;
    }
    .gate-logo .icon-wrap svg {
      width: 28px;
      height: 28px;
    }
    .gate-logo h1 {
      font-size: 1.25rem;
      color: #1a1a1a;
      margin: 0;
      font-weight: 700;
    }
    .gate-logo p {
      color: #888;
      font-size: 0.85rem;
      margin: 0.35rem 0 0;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.45rem;
    }
    .form-group input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.7rem 0.85rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      color: #222;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }
    .gate-button {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
      transition: filter 0.2s;
    }
    .gate-button:hover {
      filter: brightness(1.08);
    }
    .gate-button:disabled {
      filter: grayscale(0.6);
      cursor: not-allowed;
    }
    .gate-error {
      background: #fee2e2;
      color: #991b1b;
      padding: 0.55rem 0.8rem;
      border-radius: 6px;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .gate-note {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="gate-card">
    <div class="gate-logo">
      <div class="icon-wrap"><i data-lucide="shield-check"></i></div>
      <h1>デモアクセス</h1>
      <p>このデモ環境は関係者のみの閲覧を想定しています</p>
    </div>

    <div id="error" class="gate-error"></div>

    <form id="gate-form" autocomplete="off">
      <div class="form-group">
        <label><i data-lucide="key-round"></i> アクセスキー</label>
        <input id="key" type="password" autocomplete="off" autofocus required />
      </div>
      <button id="submit" type="submit" class="gate-button">
        <i data-lucide="log-in" style="width:16px;height:16px;vertical-align:-3px"></i>
        入室する
      </button>
    </form>

    <div class="gate-note">
      アクセスキーが必要な方は{{CONTACT}}までご連絡ください。<br />
      ※ 本機能はデモ公開用の簡易認証です。本番環境には対応しておりません。
    </div>
  </div>

  <script>
    if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();

    const form = document.getElementById("gate-form");
    const keyInput = document.getElementById("key");
    const errBox = document.getElementById("error");
    const submitBtn = document.getElementById("submit");

    function showError(msg) {
      errBox.textContent = msg;
      errBox.style.display = "block";
    }
    function clearError() {
      errBox.textContent = "";
      errBox.style.display = "none";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();
      const key = (keyInput.value || "").trim();
      if (!key) {
        showError("アクセスキーを入力してください");
        return;
      }
      submitBtn.disabled = true;
      try {
        const res = await fetch("/api/demo-auth", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ key }),
          credentials: "same-origin",
        });
        if (res.ok) {
          // 成功 → トップへ
          const next = new URLSearchParams(window.location.search).get("next") || "/";
          window.location.replace(next);
          return;
        }
        showError("アクセスキーが違います");
      } catch (err) {
        showError("通信エラーが発生しました");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
